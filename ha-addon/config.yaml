# Home Assistant Add-on Configuration
# https://developers.home-assistant.io/docs/add-ons/configuration

name: "SmartPlug Controller"
description: "Hot water recirculation pump controller - receives sensor data via MQTT and controls pump"
version: "1.0.0"
slug: "smartplug"
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: false
services:
  - mqtt:need
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Web UI"
map:
  - config:rw
options:
  sensor_node_ids:
    - "sensor-kitchen"
  actuator_type: "mqtt"
  data_timeout: 30
  start_threshold: 12.0
  stop_threshold: 8.0
  max_runtime_minutes: 15
  cooldown_minutes: 5
  schedule_enabled: true
  ha_discovery: true
  log_level: "info"
schema:
  sensor_node_ids:
    - str
  actuator_type: "str"
  data_timeout: "int"
  start_threshold: "float"
  stop_threshold: "float"
  max_runtime_minutes: "int"
  cooldown_minutes: "int"
  schedule_enabled: "bool"
  ha_discovery: "bool"
  log_level: "str"
image: "ghcr.io/smartplug/smartplug-ha-addon-{arch}"
